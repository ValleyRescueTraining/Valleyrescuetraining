<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Check-In | Valley Rescue Training</title>
  <link rel="stylesheet" href="/style.css?v=26" />
</head>
<body>

  <section class="student-checkin-page">
    <div class="container">

      <!-- LOGO -->
      <img src="/IMG_1768.png" alt="Valley Rescue Training Logo" class="checkin-logo" />

      <!-- TITLE -->
      <h1>Student Check-In</h1>

      <!-- INSTRUCTIONS -->
      <p class="checkin-text">
        If you are attending class today, please complete this form before instruction begins.
        This serves as your official class sign-in and ensures your certification is processed correctly.
      </p>

      <!-- EMBEDDED FORM -->
      <div class="tally-embed">
        <iframe 
          src="https://tally.so/embed/WOMppe"
          loading="lazy"
          width="100%" 
          height="1200" 
          frameborder="0" 
          marginheight="0" 
          marginwidth="0"
          title="Valley Rescue Training Student Registration Form">
        </iframe>
      </div>

      <!-- BACKUP BUTTON -->
      <p class="checkin-fallback">
        Having trouble? 
        <a href="https://tally.so/r/WOMppe">Tap here to open the form directly</a>.
      </p>

    </div>
  </section>

</body>
</html>
